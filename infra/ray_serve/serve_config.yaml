http_options:
  host: 0.0.0.0
  port: 8000

applications:
- name: default
  route_prefix: /
  import_path: services.main:app
  deployments:
    - name: Dispatcher
      autoscaling_config:
        min_replicas: 1
        max_replicas: 3
        target_num_ongoing_requests_per_replica: 5
      max_ongoing_requests: 20
